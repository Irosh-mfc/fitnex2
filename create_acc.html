<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitNex - Create Account</title>
    <link rel="stylesheet" href="s_style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1 class="logo-text"><img src="logo.png" width="120" height="40"></h1>
            </div>

            <h2>CREATE YOUR ACCOUNT</h2>
            <p class="subtitle">Join us and start your fitness journey</p>

            <form action="#">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Create Password" required>
                <input type="password" placeholder="Confirm Password" required>
                
                <button type="submit" class="sign-up-btn">SIGN UP</button>
            </form>

            <div class="divider">
                <span>Or sign up with</span>
            </div>

            <div class="social-container">
                <button class="social-btn google">
                    <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google">
                    Sign up with Google
                </button>
                <button class="social-btn facebook">
                    <img src="https://img.icons8.com/color/24/000000/facebook-new.png" alt="FB">
                    Sign up with Facebook
                </button>
            </div>

            <p class="footer-text">Already have an account? <a href="#">Sign in</a></p>
        </div>
    </div>
</body>
</html>
